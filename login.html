<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Customer Update System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1e293b 0%, #334155 50%, #1e293b 100%);
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-card {
            background: #fff;
            border-radius: 20px;
            padding: 40px 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }

        .login-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 2rem;
            color: #fff;
        }

        .login-card h1 {
            font-size: 1.5rem;
            color: #1e293b;
            margin-bottom: 8px;
        }

        .login-card p {
            color: #64748b;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: #374151;
            margin-bottom: 6px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
        }

        .input-field {
            width: 100%;
            padding: 12px 14px 12px 42px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.2s;
            background: #f8fafc;
        }

        .input-field:focus {
            outline: none;
            border-color: #2563eb;
            background: #fff;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.3);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .error-msg {
            color: #dc2626;
            font-size: 0.85rem;
            margin-top: 12px;
            display: none;
        }

        .error-msg.show {
            display: block;
            animation: shake 0.3s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .setup-section {
            display: none;
            text-align: left;
        }

        .setup-section.show {
            display: block;
        }

        .divider {
            margin: 20px 0;
            text-align: center;
            color: #94a3b8;
            font-size: 0.8rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            display: inline-block;
            width: 60px;
            height: 1px;
            background: #e2e8f0;
            vertical-align: middle;
            margin: 0 10px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: #64748b;
            margin-bottom: 10px;
        }

        .remember-me input {
            accent-color: #2563eb;
        }

        .footer-text {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #94a3b8;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-icon">
                <i class="fas fa-bell"></i>
            </div>
            <h1>Customer Update</h1>
            <p>Sign in to manage your orders</p>

            <!-- Login Form -->
            <div id="login-form">
                <div class="form-group">
                    <label>Username</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" id="login-username" class="input-field" placeholder="Enter username" autocomplete="username">
                    </div>
                </div>
                <div class="form-group">
                    <label>PIN / Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="login-pin" class="input-field" placeholder="Enter PIN or password" autocomplete="current-password">
                    </div>
                </div>
                <label class="remember-me">
                    <input type="checkbox" id="remember-me" checked> Remember me on this device
                </label>
                <button class="login-btn" onclick="handleLogin()">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </button>
                <div class="error-msg" id="error-msg">Invalid username or PIN</div>
                <div class="divider">or</div>
                <button class="login-btn" style="background: linear-gradient(135deg, #16a34a, #059669);" onclick="showSetup()">
                    <i class="fas fa-user-plus"></i> First Time? Set Up Account
                </button>
            </div>

            <!-- Setup Form -->
            <div id="setup-form" class="setup-section">
                <div class="form-group">
                    <label>Choose a Username</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" id="setup-username" class="input-field" placeholder="Your username">
                    </div>
                </div>
                <div class="form-group">
                    <label>Set a PIN / Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="setup-pin" class="input-field" placeholder="Choose a PIN or password">
                    </div>
                </div>
                <div class="form-group">
                    <label>Confirm PIN / Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="setup-pin-confirm" class="input-field" placeholder="Confirm your PIN">
                    </div>
                </div>
                <button class="login-btn" onclick="handleSetup()">
                    <i class="fas fa-check"></i> Create Account
                </button>
                <div class="error-msg" id="setup-error">Error</div>
                <div class="divider">or</div>
                <button class="login-btn" style="background: #64748b;" onclick="showLogin()">
                    <i class="fas fa-arrow-left"></i> Back to Login
                </button>
            </div>

            <p class="footer-text">Your data is stored securely in this browser</p>
        </div>
    </div>

    <script>
        // Check if already logged in
        (function() {
            const session = localStorage.getItem('cu_session');
            if (session) {
                window.location.href = 'index.html';
            }
        })();

        function showSetup() {
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('setup-form').classList.add('show');
        }

        function showLogin() {
            document.getElementById('login-form').style.display = 'block';
            document.getElementById('setup-form').classList.remove('show');
        }

        function handleSetup() {
            const username = document.getElementById('setup-username').value.trim();
            const pin = document.getElementById('setup-pin').value;
            const pinConfirm = document.getElementById('setup-pin-confirm').value;
            const errorEl = document.getElementById('setup-error');

            if (!username) {
                showError(errorEl, 'Username is required');
                return;
            }
            if (username.length < 3) {
                showError(errorEl, 'Username must be at least 3 characters');
                return;
            }
            if (!pin) {
                showError(errorEl, 'PIN/Password is required');
                return;
            }
            if (pin.length < 4) {
                showError(errorEl, 'PIN must be at least 4 characters');
                return;
            }
            if (pin !== pinConfirm) {
                showError(errorEl, 'PINs do not match');
                return;
            }

            // Check if account already exists
            const existing = localStorage.getItem('cu_auth');
            if (existing) {
                showError(errorEl, 'Account already exists. Please login instead.');
                return;
            }

            // Save credentials (hashed)
            const auth = {
                username: username,
                pinHash: simpleHash(pin),
                createdAt: new Date().toISOString()
            };
            localStorage.setItem('cu_auth', JSON.stringify(auth));

            // Auto login
            localStorage.setItem('cu_session', JSON.stringify({
                username: username,
                loggedInAt: new Date().toISOString()
            }));

            window.location.href = 'index.html';
        }

        function handleLogin() {
            const username = document.getElementById('login-username').value.trim();
            const pin = document.getElementById('login-pin').value;
            const errorEl = document.getElementById('error-msg');
            const remember = document.getElementById('remember-me').checked;

            if (!username || !pin) {
                showError(errorEl, 'Please enter username and PIN');
                return;
            }

            const auth = JSON.parse(localStorage.getItem('cu_auth') || 'null');

            if (!auth) {
                showError(errorEl, 'No account found. Please set up first.');
                return;
            }

            if (auth.username !== username || auth.pinHash !== simpleHash(pin)) {
                showError(errorEl, 'Invalid username or PIN');
                return;
            }

            // Login success
            if (remember) {
                localStorage.setItem('cu_session', JSON.stringify({
                    username: username,
                    loggedInAt: new Date().toISOString()
                }));
            } else {
                sessionStorage.setItem('cu_session', JSON.stringify({
                    username: username,
                    loggedInAt: new Date().toISOString()
                }));
            }

            window.location.href = 'index.html';
        }

        function showError(el, msg) {
            el.textContent = msg;
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 3000);
        }

        // Simple hash function (not for production security, but good for client-side PIN)
        function simpleHash(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                const char = str.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            return hash.toString(36);
        }

        // Enter key support
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                if (document.getElementById('setup-form').classList.contains('show')) {
                    handleSetup();
                } else {
                    handleLogin();
                }
            }
        });
    </script>
</body>
</html>
