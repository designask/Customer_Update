<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Customer Update System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1e293b 0%, #334155 50%, #1e293b 100%);
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-card {
            background: #fff;
            border-radius: 20px;
            padding: 40px 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }

        .login-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 2rem;
            color: #fff;
        }

        .login-card h1 {
            font-size: 1.5rem;
            color: #1e293b;
            margin-bottom: 8px;
        }

        .login-card .subtitle {
            color: #64748b;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: #374151;
            margin-bottom: 6px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
        }

        .input-field {
            width: 100%;
            padding: 12px 14px 12px 42px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.2s;
            background: #f8fafc;
        }

        .input-field:focus {
            outline: none;
            border-color: #2563eb;
            background: #fff;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.3);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .error-msg {
            color: #dc2626;
            font-size: 0.85rem;
            margin-top: 12px;
            display: none;
            padding: 8px 12px;
            background: #fef2f2;
            border-radius: 8px;
        }

        .error-msg.show {
            display: block;
            animation: shake 0.3s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .setup-section {
            display: none;
            text-align: left;
        }

        .setup-section.show {
            display: block;
        }

        .divider {
            margin: 20px 0;
            text-align: center;
            color: #94a3b8;
            font-size: 0.8rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            display: inline-block;
            width: 60px;
            height: 1px;
            background: #e2e8f0;
            vertical-align: middle;
            margin: 0 10px;
        }

        .footer-text {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #94a3b8;
        }

        .info-box {
            background: #eff6ff;
            border: 1px solid #bfdbfe;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 20px;
            font-size: 0.8rem;
            color: #1e40af;
            text-align: left;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-icon">
                <i class="fas fa-bell"></i>
            </div>
            <h1>Customer Update</h1>
            <p class="subtitle">Sign in to manage your orders</p>

            <!-- Login Form -->
            <div id="login-form">
                <div class="info-box">
                    <i class="fas fa-info-circle"></i> 
                    Same username & PIN works on any device! 
                    Login from phone, laptop, or tablet.
                </div>
                <div class="form-group">
                    <label>Username</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" id="login-username" class="input-field" placeholder="Enter username" autocomplete="username">
                    </div>
                </div>
                <div class="form-group">
                    <label>PIN / Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="login-pin" class="input-field" placeholder="Enter PIN or password" autocomplete="current-password">
                    </div>
                </div>
                <button class="login-btn" id="login-btn" onclick="handleLogin()">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </button>
                <div class="error-msg" id="error-msg"></div>
                <div class="divider">first time?</div>
                <button class="login-btn" style="background: linear-gradient(135deg, #16a34a, #059669);" onclick="showSetup()">
                    <i class="fas fa-user-plus"></i> Create New Account
                </button>
            </div>

            <!-- Setup Form -->
            <div id="setup-form" class="setup-section">
                <div class="info-box">
                    <i class="fas fa-info-circle"></i> 
                    Create your account once. Then use the same username & PIN to login from any device!
                </div>
                <div class="form-group">
                    <label>Choose a Username</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" id="setup-username" class="input-field" placeholder="Your username (min 3 chars)">
                    </div>
                </div>
                <div class="form-group">
                    <label>Set a PIN / Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="setup-pin" class="input-field" placeholder="Choose a PIN (min 4 chars)">
                    </div>
                </div>
                <div class="form-group">
                    <label>Confirm PIN / Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="setup-pin-confirm" class="input-field" placeholder="Confirm your PIN">
                    </div>
                </div>
                <button class="login-btn" id="setup-btn" onclick="handleSetup()">
                    <i class="fas fa-check"></i> Create Account
                </button>
                <div class="error-msg" id="setup-error"></div>
                <div class="divider">already have an account?</div>
                <button class="login-btn" style="background: #64748b;" onclick="showLogin()">
                    <i class="fas fa-arrow-left"></i> Back to Login
                </button>
            </div>

            <p class="footer-text">Data syncs across all your devices</p>
        </div>
    </div>

    <script src="js/storage.js"></script>
    <script>
        // Check if already logged in
        (function() {
            const session = localStorage.getItem('cu_session');
            if (session) {
                window.location.href = 'index.html';
            }
        })();

        function showSetup() {
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('setup-form').classList.add('show');
        }

        function showLogin() {
            document.getElementById('login-form').style.display = 'block';
            document.getElementById('setup-form').classList.remove('show');
        }

        async function handleSetup() {
            const username = document.getElementById('setup-username').value.trim().toLowerCase();
            const pin = document.getElementById('setup-pin').value;
            const pinConfirm = document.getElementById('setup-pin-confirm').value;
            const errorEl = document.getElementById('setup-error');
            const btn = document.getElementById('setup-btn');

            if (!username || username.length < 3) {
                showError(errorEl, 'Username must be at least 3 characters');
                return;
            }
            if (!pin || pin.length < 4) {
                showError(errorEl, 'PIN must be at least 4 characters');
                return;
            }
            if (pin !== pinConfirm) {
                showError(errorEl, 'PINs do not match');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Creating...';

            try {
                // Create account on cloud storage
                const result = await CloudDB.createAccount(username, pin);
                
                if (!result.success) {
                    showError(errorEl, result.error || 'Failed to create account');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-check"></i> Create Account';
                    return;
                }

                // Save session locally
                localStorage.setItem('cu_session', JSON.stringify({
                    username: username,
                    storageId: result.storageId,
                    loggedInAt: new Date().toISOString()
                }));

                window.location.href = 'index.html';
            } catch (err) {
                showError(errorEl, 'Network error. Please try again.');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-check"></i> Create Account';
            }
        }

        async function handleLogin() {
            const username = document.getElementById('login-username').value.trim().toLowerCase();
            const pin = document.getElementById('login-pin').value;
            const errorEl = document.getElementById('error-msg');
            const btn = document.getElementById('login-btn');

            if (!username || !pin) {
                showError(errorEl, 'Please enter username and PIN');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Signing in...';

            try {
                const result = await CloudDB.login(username, pin);

                if (!result.success) {
                    showError(errorEl, result.error || 'Invalid username or PIN');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
                    return;
                }

                // Save session locally
                localStorage.setItem('cu_session', JSON.stringify({
                    username: username,
                    storageId: result.storageId,
                    loggedInAt: new Date().toISOString()
                }));

                window.location.href = 'index.html';
            } catch (err) {
                showError(errorEl, 'Network error. Please check your internet.');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
            }
        }

        function showError(el, msg) {
            el.textContent = msg;
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 5000);
        }

        // Enter key support
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                if (document.getElementById('setup-form').classList.contains('show')) {
                    handleSetup();
                } else {
                    handleLogin();
                }
            }
        });
    </script>
</body>
</html>
